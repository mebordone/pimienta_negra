# LocalSettings usa $wgScriptPath = "/wiki": las URLs llevan prefijo /wiki/ pero los PHP
# (index.php, load.php, api.php, …) están en la raíz de DocumentRoot.
# Sin este alias, /wiki/load.php no existe en disco y short-url.conf reescribe a index.php,
# rompiendo CSS/JS de ResourceLoader (la wiki se ve “sin estilo”).

Alias /wiki /var/www/html

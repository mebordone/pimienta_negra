# Gateway: HTTP en 80 (wiki, archivos, etc.). HTTPS en 443:
#   - /chat/, /http-bind, /xmpp-websocket → servidos por TLS (Converse necesita contexto
#     seguro: crypto.subtle no existe en http://pimienta.local, solo en https o localhost).
#   - el resto → 301 a HTTP (certificado solo para quien lo necesite).
# Certificados: ./data/prosody-certs (./ops/init-chat.sh).

upstream wiki_upstream {
    server wiki:80;
}

upstream filebrowser_upstream {
    server filebrowser:80;
}

# Prosody: WebSocket y BOSH en HTTP plano 5280 (tráfico interno Docker, TLS no necesario).
upstream prosody_http {
    server prosody:5280;
}

server {
    listen 443 ssl;
    server_name pimienta.local localhost accounts.pimienta.local conference.pimienta.local;

    ssl_certificate     /etc/nginx/certs/pimienta.local.crt;
    ssl_certificate_key /etc/nginx/certs/pimienta.local.key;

    client_max_body_size 100M;

    location = /chat {
        return 302 /chat/;
    }

    location /chat/ {
        alias /usr/share/nginx/html/chat/;
        try_files $uri $uri/ /chat/index.html;
    }

    location /http-bind {
        proxy_pass http://prosody_http/http-bind;
        proxy_set_header Host pimienta.local;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /xmpp-websocket {
        proxy_pass http://prosody_http/xmpp-websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host pimienta.local;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    # Wiki y archivos: seguir en HTTP (evita certificado en cada página).
    location / {
        return 301 http://$http_host$request_uri;
    }
}

server {
    listen 80;
    server_name pimienta.local localhost;

    client_max_body_size 100M;

    location = /chat {
        return 302 /chat/;
    }

    # Converse.js (estático)
    location /chat/ {
        alias /usr/share/nginx/html/chat/;
        try_files $uri $uri/ /chat/index.html;
    }

    # WebSocket y HTTP XMPP hacia Prosody
    location /http-bind {
        proxy_pass http://prosody_http/http-bind;
        proxy_set_header Host pimienta.local;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /xmpp-websocket {
        proxy_pass http://prosody_http/xmpp-websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host pimienta.local;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location = /archivos {
        return 302 /archivos/;
    }

    # FileBrowser: baseURL=/archivos en settings.json; nginx reenvía la ruta completa.
    location /archivos/ {
        proxy_pass http://filebrowser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }

    # MediaWiki
    location / {
        proxy_pass http://wiki_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}

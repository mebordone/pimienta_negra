# Gateway único en puerto 80: wiki, chat estático, archivos, WebSocket XMPP

upstream wiki_upstream {
    server wiki:80;
}

upstream filebrowser_upstream {
    server filebrowser:80;
}

# Prosody 13 sirve BOSH/WebSocket TLS en 5281 (HTTP plano en 5280 no expone WS en esta config)
upstream prosody_https {
    server prosody:5281;
}

server {
    listen 80;
    server_name pimienta.local localhost;

    client_max_body_size 100M;

    location = /chat {
        return 302 /chat/;
    }

    # Converse.js (estático)
    location /chat/ {
        alias /usr/share/nginx/html/chat/;
        try_files $uri $uri/ /chat/index.html;
    }

    # WebSocket y HTTP XMPP hacia Prosody
    location /http-bind {
        proxy_pass https://prosody_https/http-bind;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host pimienta.local;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /xmpp-websocket {
        proxy_pass https://prosody_https/xmpp-websocket;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host pimienta.local;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location = /archivos {
        return 302 /archivos/;
    }

    # FileBrowser: baseURL=/archivos en settings.json; nginx reenvía la ruta completa.
    location /archivos/ {
        proxy_pass http://filebrowser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }

    # MediaWiki
    location / {
        proxy_pass http://wiki_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}

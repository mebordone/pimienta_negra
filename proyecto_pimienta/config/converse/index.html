<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Pimienta</title>
  <!-- Recursos empaquetados en vendor/ (LAN sin Internet). Actualizar: ./ops/vendor-converse.sh -->
  <link rel="stylesheet" href="vendor/converse.min.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    body.converse-fullscreen {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    #converse-root { flex: 1; min-height: 0; }
    .pimienta-chat-note {
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
    }
    .pimienta-chat-note a { color: #0645ad; }
  </style>
</head>
<body class="converse-fullscreen">
  <p class="pimienta-chat-note">
    Entrás como invitadx sin contraseña. Cuenta opcional (usuario fijo) en el dominio
    <strong>accounts.pimienta.local</strong> — registración abierta en la red local desde un cliente XMPP.
    Moderación: <strong>admin@accounts.pimienta.local</strong> (ver README).
  </p>
  <div id="converse-root"></div>
  <script src="vendor/3rdparty/libsignal-protocol.min.js"></script>
  <script src="vendor/converse.min.js"></script>
  <script>
    (function () {
      var mount = document.getElementById('converse-root');
      if (!mount) {
        console.error('converse-root no encontrado');
        return;
      }
      var host = window.location.host;
      var assetsBase = window.location.origin + '/chat/vendor/';
      var wsUrl = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + host + '/xmpp-websocket';
      var boshUrl = window.location.protocol + '//' + host + '/http-bind';
      converse.initialize({
        // root debe ser un nodo DOM, no una ruta URL (la doc default es document).
        root: mount,
        assets_path: assetsBase,
        view_mode: 'fullscreen',
        language: 'es',
        discover_connection_methods: false,
        websocket_url: wsUrl,
        bosh_service_url: boshUrl,
        domain: 'pimienta.local',
        // Con anonymous, el dominio del servidor anónimo va en jid (doc Converse).
        jid: 'pimienta.local',
        muc_domain: 'conference.pimienta.local',
        locked_muc_domain: 'conference.pimienta.local',
        auto_join_rooms: [
          'general@conference.pimienta.local',
          'maestranza@conference.pimienta.local',
          'asamblea@conference.pimienta.local'
        ],
        play_sounds: false,
        show_controlbox_by_default: true,
        authentication: 'anonymous',
        auto_login: true,
        auto_reconnect: true,
        strict_plugin_dependencies: false,
        keepalive: true
      });
    })();
  </script>
</body>
</html>

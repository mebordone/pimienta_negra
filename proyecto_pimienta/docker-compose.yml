services:
  db:
    image: mariadb:10.5
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASS:-pimienta_rosa}
      - MYSQL_DATABASE=my_wiki
      - MYSQL_USER=wikiuser
      - MYSQL_PASSWORD=wikipassword
    command: ["--innodb-large-prefix=ON", "--innodb-file-format=Barracuda"]
    volumes:
      - db_data:/var/lib/mysql

  wiki:
    image: mediawiki:latest
    restart: always
    expose:
      - "80"
    ports:
      - "8080:80"
    environment:
      # Vacío = MediaWiki usa el host de la petición (IP o .local); definí MW_SERVER para forzar una URL fija.
      - MW_SERVER=${MW_SERVER:-}
      - NODE_DOMAIN=${NODE_DOMAIN:-pimienta.local}
      - MW_DB_SERVER=db
      - MW_DB_NAME=my_wiki
      - MW_DB_USER=wikiuser
      - MW_DB_PASS=wikipassword
    volumes:
      - ./config/mediawiki/LocalSettings.php:/var/www/html/LocalSettings.php
      - ./config/mediawiki/apache-wiki-path.conf:/etc/apache2/conf-enabled/wiki-path.conf:ro
      - ./data/mediawiki/images:/var/www/html/images
    depends_on:
      - db

  prosody:
    image: prosodyim/prosody:13.0
    restart: always
    expose:
      - "5280"
    environment:
      - PROSODY_ADMIN_PASSWORD=${PROSODY_ADMIN_PASSWORD:-pimienta_prosody_admin}
      - NODE_DOMAIN=${NODE_DOMAIN:-pimienta.local}
    volumes:
      - ./config/prosody/prosody.cfg.lua:/etc/prosody/prosody.cfg.lua:ro
      - ./config/prosody/conf.d:/etc/prosody/conf.d:ro
      - ./data/prosody:/var/lib/prosody
      - ./data/prosody-certs:/etc/prosody/certs
      - ./ops/prosody-entrypoint.sh:/opt/pimienta/prosody-entrypoint.sh:ro
    entrypoint: ["/usr/bin/tini", "--", "/bin/sh", "/opt/pimienta/prosody-entrypoint.sh"]

  filebrowser:
    image: filebrowser/filebrowser:latest
    restart: always
    expose:
      - "80"
    ports:
      - "8081:80"
    environment:
      - FILEBROWSER_ADMIN_USERNAME=${FILEBROWSER_ADMIN_USERNAME:-admin}
      - FILEBROWSER_ADMIN_PASSWORD=${FILEBROWSER_ADMIN_PASSWORD:-pimienta_admin_fb}
      - FILEBROWSER_INVITADO_USERNAME=${FILEBROWSER_INVITADO_USERNAME:-pimienta}
      - FILEBROWSER_INVITADO_PASSWORD=${FILEBROWSER_INVITADO_PASSWORD:-pimienta}
    entrypoint: ["/bin/sh", "/opt/pimienta/filebrowser-entrypoint.sh"]
    volumes:
      - ./archivos:/srv
      - ./config/filebrowser:/config
      - ./config/filebrowser/branding:/branding:ro
      - ./data/filebrowser:/database
      - ./ops/filebrowser-entrypoint.sh:/opt/pimienta/filebrowser-entrypoint.sh:ro
      - ./ops/bootstrap-filebrowser-users.sh:/opt/pimienta/bootstrap-filebrowser-users.sh:ro

  gateway:
    image: nginx:alpine
    restart: always
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/favicon.png:/usr/share/nginx/html/favicon.png:ro
      - ./config/filebrowser/branding/img/icons:/usr/share/nginx/filebrowser-icons:ro
      - ./config/converse:/usr/share/nginx/html/chat:ro
      - ./config/landing:/usr/share/nginx/html/landing:ro
      - ./data/prosody-certs:/etc/nginx/certs:ro
    depends_on:
      - wiki
      - filebrowser
      - prosody

volumes:
  db_data:

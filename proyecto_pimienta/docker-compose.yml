version: '3.8'

services:
  # Base de Datos para MediaWiki
  db:
    image: mariadb:10.5
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=pimienta_rosa
      - MYSQL_DATABASE=my_wiki
      - MYSQL_USER=wikiuser
      - MYSQL_PASSWORD=wikipassword
    volumes:
      - db_data:/var/lib/mysql

  # Tu Wiki (Ya funcionando)
  wiki:
    image: mediawiki:latest
    restart: always
    ports:
      - 8080:80
    environment:
      - MW_DB_SERVER=db
      - MW_DB_NAME=my_wiki
      - MW_DB_USER=wikiuser
      - MW_DB_PASS=wikipassword
    volumes:
      - ./data/mediawiki/LocalSettings.php:/var/www/html/LocalSettings.php
    depends_on:
      - db

  # --- EL NUEVO CHAT SOBERANO ---
  
  # Matrix Synapse (El motor del chat)
  synapse:
    image: matrixdotorg/synapse:latest
    restart: always
    ports:
      - 8008:8008
    environment:
      - SYNAPSE_SERVER_NAME=AguaribayPI
      - SYNAPSE_REPORT_STATS=no
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
    volumes:
      - ./data/synapse:/data
    depends_on:
      - db_matrix

  # Base de datos específica para Matrix (Postgres es lo ideal)
  db_matrix:
    image: postgres:14-alpine
    restart: always
    environment:
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=pimienta_rosa
      - POSTGRES_DB=synapse_v1
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

volumes:
  db_data:
